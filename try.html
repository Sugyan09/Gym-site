<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Hard Navbar</title>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* ===== Top Black Bar ===== */
.top-bar{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 40px;
    font-size:14px;
}

.top-left span{
    margin-right:25px;
}

.top-left i{
    color:#ff0000;
    margin-right:6px;
}

.top-right i{
    margin-left:15px;
    cursor:pointer;
    transition:0.3s;
}

.top-right i:hover{
    color:#ff0000;
}

/* ===== Main Navbar ===== */
.navbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fff;
    padding:0 40px;
    height:80px;
}

/* Logo Section */
.logo{
    background:#e50914;
    height:100%;
    display:flex;
    align-items:center;
    padding:0 30px;
    color:#fff;
    font-weight:bold;
    font-size:22px;
    position:relative;
}

.logo::after{
    content:"";
    position:absolute;
    right:-40px;
    top:0;
    border-top:40px solid transparent;
    border-bottom:40px solid transparent;
    border-left:40px solid #e50914;
}

/* Nav Links */
.nav-links{
    list-style:none;
    display:flex;
    align-items:center;
}

.nav-links li{
    margin:0 18px;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-weight:600;
    font-size:15px;
    transition:0.3s;
}

.nav-links a:hover,
.nav-links a.active{
    color:#e50914;
}

/* Right Icons */
.nav-right{
    display:flex;
    align-items:center;
}

.search-icon{
    margin-right:20px;
    cursor:pointer;
    font-size:18px;
}

.menu-btn{
    background:#e50914;
    color:#fff;
    padding:15px 18px;
    cursor:pointer;
    font-size:20px;
}

/* ===== Responsive ===== */
@media(max-width:900px){
    .nav-links{
        position:absolute;
        top:160px;
        left:0;
        width:100%;
        background:#fff;
        flex-direction:column;
        display:none;
        padding:20px 0;
        box-shadow:0 5px 10px rgba(0,0,0,0.1);
    }

    .nav-links li{
        margin:15px 0;
    }

    .nav-links.show{
        display:flex;
    }
}
</style>
</head>
<body>

<!-- ===== Top Contact Bar ===== -->
<div class="top-bar">
    <div class="top-left">
        <span><i class="fa-solid fa-phone"></i> 740.993.7266</span>
        <span><i class="fa-solid fa-envelope"></i> Shanny80@gmail.com</span>
    </div>
    <div class="top-right">
        <i class="fa-brands fa-facebook-f"></i>
        <i class="fa-brands fa-twitter"></i>
        <i class="fa-brands fa-google-plus-g"></i>
        <i class="fa-brands fa-instagram"></i>
    </div>
</div>

<!-- ===== Main Navbar ===== -->
<nav class="navbar">

    <div class="logo">
        TRAIN HARD
    </div>

    <ul class="nav-links" id="navLinks">
        <li><a href="#" class="active">HOME</a></li>
        <li><a href="#">SHOP</a></li>
        <li><a href="#">ABOUT</a></li>
        <li><a href="#">CONTACT</a></li>
        <li><a href="#">FAQ</a></li>
    </ul>

    <div class="nav-right">
        <div class="search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="menu-btn" id="menuBtn">
            <i class="fa-solid fa-bars"></i>
        </div>
    </div>

</nav>

<script>
// Toggle menu for mobile
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");

menuBtn.addEventListener("click", () => {
    navLinks.classList.toggle("show");
});
</script>

</body>
</html>
